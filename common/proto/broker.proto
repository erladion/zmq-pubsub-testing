syntax = "proto3";
package broker;

import "google/protobuf/any.proto";

message BrokerPayload {
  string handler_key = 1;
  string sender_id = 2;
  string topic = 3;
  google.protobuf.Any payload = 4;
  string origin_broker_id = 5;
  string message_uuid = 6;

  string transfer_id = 7;
  int32 sequence_number = 8;
  int32 sequence_count = 9;
  bytes raw_data = 10;
}

service BrokerService {
  // Bi-directional stream: One connection, two-way traffic
  rpc MessageStream (stream BrokerPayload) returns (stream BrokerPayload);
}

message ClientInfo {
    string id = 1;
    repeated string subscriptions = 2;
}

message SystemStats {
    string broker_id = 1;
    int32 clients_count = 2;
    int32 peers_count = 3;
    int32 msgs_per_sec = 4;
    double kb_per_sec = 5;
    int64 total_msgs = 6;
    int64 uptime_sec = 7;
    repeated ClientInfo connected_clients = 8;
}
