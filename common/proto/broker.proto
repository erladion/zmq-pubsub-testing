syntax = "proto3";
package broker;

option cc_enable_arenas = true;

// Routing envelope, carried as its own ZMQ frame ahead of an opaque payload
// frame. The broker parses only this header to route a message and never looks
// at the payload that follows, so any payload encoding (a packed protobuf Any,
// JSON, raw bytes) passes through untouched. Field numbers 4 and 10 previously
// held the inlined payload (a google.protobuf.Any) and raw_data; both now
// travel as the second frame - see common/wireframe.h.
message MessageHeader {
  reserved 4, 10;

  string handler_key = 1;
  string sender_id = 2;
  string topic = 3;
  string origin_broker_id = 5;
  string message_uuid = 6;

  string transfer_id = 7;
  int32 sequence_number = 8;
  int32 sequence_count = 9;

  string reply_topic = 11;
}

message ClientInfo {
    string id = 1;
    repeated string subscriptions = 2;
}

message SystemStats {
    string broker_id = 1;
    int32 clients_count = 2;
    int32 peers_count = 3;
    int32 msgs_per_sec = 4;
    double kb_per_sec = 5;
    int64 total_msgs = 6;
    int64 uptime_sec = 7;
    repeated ClientInfo connected_clients = 8;
}
